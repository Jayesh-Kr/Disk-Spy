<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DiskSpy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #888;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --amber: #fbbf24;
    --purple: #a78bfa;
    --pink: #f472b6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cascadia Code', 'Consolas', 'Menlo', monospace;
    font-size: 13px;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  h1::before { content: "▣ "; color: var(--blue); }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(74, 222, 128, 0.1);
    color: var(--green);
    font-size: 12px;
  }
  .status::before { content: "●"; }
  .pill {
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    border: 1px solid var(--border);
  }
  .pill strong { color: var(--text); }
  .spacer { flex: 1; }
  button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  button:hover { border-color: var(--blue); color: var(--blue); }
  main { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .panel h2 {
    margin: 0 0 12px 0;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  tr:hover td { background: rgba(96, 165, 250, 0.05); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .cat-Docker { color: var(--blue); }
  .cat-Python { color: var(--amber); }
  .cat-Node\/npm, .cat-Rust\/Cargo, .cat-Git { color: var(--green); }
  .cat-Ollama { color: var(--purple); }
  .cat-Claude, .cat-WSL2 { color: var(--pink); }
  .fullpath { word-break: break-all; }
  .truncate { max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chart-wrap { height: 280px; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--border);
    font-size: 10px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<header>
  <h1>DiskSpy</h1>
  <span class="status" id="status">● Monitoring</span>
  <span class="pill">Uptime <strong id="uptime">0s</strong></span>
  <span class="pill">Events today <strong id="events-today">0</strong></span>
  <span class="pill">DB size <strong id="db-size">0.0 MB</strong></span>
  <span class="spacer"></span>
  <button id="refresh">Refresh</button>
</header>
<main>
  <div class="grid">
    <div class="panel">
      <h2>Today's Top Space Consumers</h2>
      <div class="chart-wrap"><canvas id="topGrowersChart"></canvas></div>
    </div>
    <div class="panel">
      <h2>30-Day Growth Timeline</h2>
      <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>
    </div>
  </div>

  <div class="panel" style="margin-bottom: 20px;">
    <h2>Recent Events (auto-refresh every 10s)</h2>
    <table id="events-table">
      <thead>
        <tr>
          <th style="width: 140px;">Time</th>
          <th style="width: 200px;">Process</th>
          <th>File Path</th>
          <th style="width: 120px; text-align: right;">Change</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="4" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>Largest Files Changed (last 7 days)</h2>
    <table id="files-table">
      <thead>
        <tr>
          <th>File Path</th>
          <th style="width: 200px;">App</th>
          <th style="width: 140px; text-align: right;">Total Growth</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="3" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>
</main>
<script>
const CATEGORY_COLORS = {
  "Docker": "rgba(96, 165, 250, 0.8)",
  "Node/npm": "rgba(74, 222, 128, 0.8)",
  "Python": "rgba(251, 191, 36, 0.8)",
  "Rust/Cargo": "rgba(74, 222, 128, 0.8)",
  "Git": "rgba(74, 222, 128, 0.8)",
  "Ollama (AI Models)": "rgba(167, 139, 250, 0.8)",
  "Claude Desktop": "rgba(244, 114, 182, 0.8)",
  "WSL2": "rgba(244, 114, 182, 0.8)",
  "App Installer": "rgba(251, 191, 36, 0.8)",
};

function colorForLabel(label) {
  if (label.includes("Docker")) return "rgba(96, 165, 250, 0.8)";
  if (label.includes("Node") || label.includes("npm")) return "rgba(74, 222, 128, 0.8)";
  if (label.includes("Python") || label.includes("pip")) return "rgba(251, 191, 36, 0.8)";
  if (label.includes("Rust") || label.includes("Cargo")) return "rgba(74, 222, 128, 0.8)";
  if (label.includes("Ollama")) return "rgba(167, 139, 250, 0.8)";
  if (label.includes("Claude")) return "rgba(244, 114, 182, 0.8)";
  if (label.includes("WSL")) return "rgba(244, 114, 182, 0.8)";
  return "rgba(160, 160, 160, 0.8)";
}

function formatBytes(n) {
  n = Number(n);
  const sign = n < 0 ? "-" : "+";
  n = Math.abs(n);
  if (n < 1024) return sign + n + " B";
  if (n < 1024*1024) return sign + (n/1024).toFixed(1) + " KB";
  if (n < 1024*1024*1024) return sign + (n/1024/1024).toFixed(2) + " MB";
  return sign + (n/1024/1024/1024).toFixed(2) + " GB";
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString();
}

let topGrowersChart, dailyChart;

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP " + r.status + " for " + url);
  return r.json();
}

async function refreshStatus() {
  try {
    const s = await fetchJson("/api/status");
    document.getElementById("status").textContent = "● Monitoring";
    document.getElementById("uptime").textContent = formatUptime(s.uptime_seconds);
    document.getElementById("events-today").textContent = s.events_today;
    document.getElementById("db-size").textContent = s.db_size_mb.toFixed(2) + " MB";
  } catch (e) {
    document.getElementById("status").textContent = "○ Disconnected";
    console.error(e);
  }
}

function formatUptime(secs) {
  if (secs < 60) return secs + "s";
  if (secs < 3600) return Math.floor(secs/60) + "m " + (secs%60) + "s";
  if (secs < 86400) return Math.floor(secs/3600) + "h " + Math.floor((secs%3600)/60) + "m";
  return Math.floor(secs/86400) + "d " + Math.floor((secs%86400)/3600) + "h";
}

async function refreshTopGrowers() {
  const data = await fetchJson("/api/top-growers?days=1");
  const labels = data.map(d => d.process_label);
  const bytes = data.map(d => Number(d.total_bytes));
  const colors = labels.map(colorForLabel);
  const ctx = document.getElementById("topGrowersChart");
  if (topGrowersChart) topGrowersChart.destroy();
  if (data.length === 0) {
    ctx.parentElement.innerHTML = '<div class="empty">No data yet. DiskSpy is watching…</div>';
    return;
  }
  topGrowersChart = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets: [{ data: bytes, backgroundColor: colors, borderColor: colors }] },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => formatBytes(ctx.parsed.x) + " (" + ctx.dataset.data[ctx.dataIndex] + " events)"
          }
        }
      },
      scales: {
        x: { ticks: { color: "#888", callback: (v) => (v/1024/1024/1024).toFixed(2) + " GB" }, grid: { color: "#222" } },
        y: { ticks: { color: "#e0e0e0" }, grid: { color: "#222" } }
      }
    }
  });
}

async function refreshDaily() {
  const data = await fetchJson("/api/daily?days=30");
  const ctx = document.getElementById("dailyChart");
  if (dailyChart) dailyChart.destroy();
  if (data.length === 0) {
    ctx.parentElement.innerHTML = '<div class="empty">No data yet.</div>';
    return;
  }
  // Pivot: { date -> { label -> bytes } }
  const byDate = {};
  const labels = new Set();
  for (const row of data) {
    if (!byDate[row.date]) byDate[row.date] = {};
    byDate[row.date][row.process_label] = Number(row.total_bytes);
    labels.add(row.process_label);
  }
  const dates = Object.keys(byDate).sort();
  const labelArr = [...labels];
  const datasets = labelArr.map(label => ({
    label,
    data: dates.map(d => (byDate[d][label] || 0) / 1024 / 1024 / 1024),
    backgroundColor: colorForLabel(label),
    stack: "all",
  }));
  dailyChart = new Chart(ctx, {
    type: "bar",
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: "#e0e0e0" } },
        tooltip: { callbacks: { label: (c) => c.dataset.label + ": " + c.parsed.y.toFixed(2) + " GB" } }
      },
      scales: {
        x: { stacked: true, ticks: { color: "#888" }, grid: { color: "#222" } },
        y: { stacked: true, ticks: { color: "#888", callback: (v) => v.toFixed(1) + " GB" }, grid: { color: "#222" } }
      }
    }
  });
}

async function refreshEvents() {
  const data = await fetchJson("/api/changes?limit=50");
  const tbody = document.querySelector("#events-table tbody");
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No events yet. DiskSpy is watching…</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(e => {
    const cls = e.delta_bytes > 0 ? "pos" : (e.delta_bytes < 0 ? "neg" : "");
    return `<tr>
      <td>${formatTime(e.changed_at)}</td>
      <td><span class="badge">${e.process_label}</span></td>
      <td class="truncate" title="${e.file_path}">${e.file_path}</td>
      <td class="${cls}" style="text-align: right;">${formatBytes(e.delta_bytes)}</td>
    </tr>`;
  }).join("");
}

async function refreshLargestFiles() {
  const data = await fetchJson("/api/largest-files?days=7");
  const tbody = document.querySelector("#files-table tbody");
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">No data yet.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(e => `<tr>
    <td class="truncate" title="${e.file_path}">${e.file_path}</td>
    <td><span class="badge">${e.process_label}</span></td>
    <td class="pos" style="text-align: right;">${formatBytes(e.total_bytes)}</td>
  </tr>`).join("");
}

async function refreshAll() {
  try {
    await refreshStatus();
    await refreshTopGrowers();
    await refreshDaily();
    await refreshEvents();
    await refreshLargestFiles();
  } catch (e) {
    console.error("refresh failed", e);
  }
}

document.getElementById("refresh").addEventListener("click", refreshAll);
refreshAll();
setInterval(refreshAll, 10000);
</script>
</body>
</html>
